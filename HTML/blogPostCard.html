<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card - freeCodeCamp CSS Course</title>

    <link rel="stylesheet" href="../CSS/blogPostCard.css">
</head>

<body>
    <div class="blog-post-card">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
            alt="User using a laptop to navigate the internet." class="post-img">
        <div class="post-content">
            <h2 class="post-title">The internet in our lives</h2>
            <p class="post-excerpt">Since the turn of the century, the internet has become part of daily life for people worldwide.</p>
            <a href="https://www.google.com/search?q=The+presence+of+the+internet+since+the+start+of+the+century+on+people+lives" target="_blank" class="read-more">Read More</a>
        </div>
    </div>

</body>

</html>
