<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylized To-Do List - freeCodeCamp CSS Course</title>

    <link rel="stylesheet" href="../CSS/stylizedToDoList.css">
</head>

<body>
    <ul class="todo-list">
        <li>
            <input type="checkbox" name="" id="productIdea">
            <label for="productIdea">Think of a product idea</label>
            <ul class="sub-item">
                <li>
                    <a href="https://www.google.com/search?q=most+used+software+products" target="_blank"
                        class="sub-item-link">Read about most used software products</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" name="" id="productDesign">
            <label for="productDesign">Plan and design your product</label>
            <ul class="sub-item">
                <li>
                    <a href="https://www.google.com/search?q=Planning%2C+Analysis+and+Design+in+Software+Development"
                        target="_blank" class="sub-item-link">Learn about Planning, Analysis and Design in
                        Software Development</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" name="" id="productDevelopment">
            <label for="productDevelopment">Start coding...</label>
            <ul class="sub-item">
                <li>
                    <a href="https://www.google.com/search?q=Software+Development+best+practices" target="_blank"
                        class="sub-item-link">Code with ease leveranging Software
                        Development best practices</a>
                </li>
            </ul>
        </li>
        <li>
            <input type="checkbox" name="" id="productDeployment">
            <label for="productDeployment">Test, Deploy and Provide ongoing support for your users</label>
            <ul class="sub-item">
                <li>
                    <a href="https://www.google.com/search?q=importance+of+ongoing+support+after+a+software+product+is+released"
                        target="_blank" class="sub-item-link">Success after all tests are passed and the product
                        is released: the importance of ongoing support</a>
                </li>
            </ul>
        </li>
    </ul>

</body>

</html>
