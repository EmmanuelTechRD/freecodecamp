<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designing a Feature Selection Page - freeCodeCamp CSS Course</title>

    <link rel="stylesheet" href="../CSS/featureSelectionPage.css">
</head>

<body>
    <h1>Choose from the top-four gaming CPUs for 2026</h1>
    <div class="feature-card-container">
        <label for="processor1" class="feature-card">
            AMD Ryzen 7 9800X3D
            <input type="checkbox" name="processor1" id="processor1">
        </label>
        <label for="processor2" class="feature-card">
            AMD Ryzen 9 9950X3D2
            <input type="checkbox" name="processor2" id="processor2">
        </label>
        <label for="processor3" class="feature-card">
            Intel Core Ultra 7 270K Plus
            <input type="checkbox" name="processor3" id="processor3">
        </label>
        <label for="processor4" class="feature-card">
            AMD Ryzen 5 9600X
            <input type="checkbox" name="processor4" id="processor4">
        </label>
    </div>

</body>

</html>
