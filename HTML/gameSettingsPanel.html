<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a Game Settings Panel - freeCodeCamp CSS Course</title>

    <link rel="stylesheet" href="../CSS/gameSettingsPanel.css">
</head>

<body>
    <div class="settings-card">
        <h1>Game Settings</h1>
        <label for="effects">
            <input type="checkbox" name="soundEffects" id="effects"> Sound Effects
        </label>
        <label for="music">
            <input type="checkbox" name="backgroundMusic" id="music"> Background Music
        </label>
        <label for="mode">
            <input type="checkbox" name="hardMode" id="mode"> Hard Mode
        </label>
        <label for="feedback">
            <input type="checkbox" name="hapticFeedback" id="feedback"> Haptic Feedback
        </label>
    </div>

</body>

</html>
