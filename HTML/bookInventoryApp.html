<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a Book Inventory App - freeCodeCamp CSS Course</title>

    <link rel="stylesheet" href="../CSS/bookInventoryApp.css">
</head>

<body>
    <h1>Book Inventory</h1>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Status</th>
                <th>Rate</th>
            </tr>
        </thead>
        <tbody>
            <tr class="read">
                <td>Dune</td>
                <td>Frank Herbert</td>
                <td>Science Fiction</td>
                <td>
                    <span class="status">Read</span>
                </td>
                <td>
                    <span class="rate three">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
            <tr class="to-read">
                <td>Atomic Habits</td>
                <td>James Clear</td>
                <td>Productivity</td>
                <td>
                    <span class="status">To Read</span>
                </td>
                <td>
                    <span class="rate two">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
            <tr class="in-progress">
                <td>Pride and Prejudice</td>
                <td>Jane Austen</td>
                <td>Classic Romance</td>
                <td>
                    <span class="status">In Progress</span>
                </td>
                <td>
                    <span class="rate two">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
            <tr class="in-progress">
                <td>Educated</td>
                <td>Tara Westover</td>
                <td>Biography</td>
                <td>
                    <span class="status">In Progress</span>
                </td>
                <td>
                    <span class="rate one">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
            <tr class="read">
                <td>The Maid</td>
                <td>Nita Prose</td>
                <td>Mystery</td>
                <td>
                    <span class="status">Read</span>
                </td>
                <td>
                    <span class="rate three">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
